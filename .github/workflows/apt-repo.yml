name: APT Repository

on:
  workflow_run:
    workflows: [ "release" ]
    types: [ completed ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'The release tag'
        required: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code (Main)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.release_tag }}

      - name: Checkout gh-pages (to a subfolder)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: current_pages

      - name: Determine Target Tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG=$(git describe --tags --exact-match ${{ github.event.workflow_run.head_sha }})
          else
            TAG="${{ inputs.release_tag }}"
          fi
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT

      - name: Install APT Dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Download Release Artifacts (*.deb)
        run: |
          REPO="${{ github.repository }}"
          gh release download ${{ steps.get_tag.outputs.tag_name }} --repo $REPO --pattern "*.deb"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build APT Repository Structure
        run: |
          # Create a 'repo' directory inside the existing pages content
          # This keeps APT files at your-url.com/repo/
          mkdir -p current_pages/repo/pool/main
          mkdir -p current_pages/repo/dists/stable/main/binary-amd64
          mkdir -p current_pages/repo/dists/stable/main/binary-arm64
          
          mv *.deb current_pages/repo/pool/main/
          
          cd current_pages/repo
          
          dpkg-scanpackages -a amd64 pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -9c < dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz
          
          dpkg-scanpackages -a arm64 pool/main /dev/null > dists/stable/main/binary-arm64/Packages
          gzip -9c < dists/stable/main/binary-arm64/Packages > dists/stable/main/binary-arm64/Packages.gz
          
          cd dists/stable
          cat <<EOF > apt-release.conf
          APT::FTPArchive::Release::Origin "kubara-io";
          APT::FTPArchive::Release::Label "Kubara";
          APT::FTPArchive::Release::Suite "stable";
          APT::FTPArchive::Release::Codename "stable";
          APT::FTPArchive::Release::Architectures "amd64 arm64";
          APT::FTPArchive::Release::Components "main";
          EOF
          apt-ftparchive -c apt-release.conf release . > Release
          
          gpg --batch --yes --local-user "${{ steps.import-gpg.outputs.fingerprint }}" --clearsign -o InRelease Release
          gpg --batch --yes --local-user "${{ steps.import-gpg.outputs.fingerprint }}" -abs -o Release.gpg Release
          
          gpg --armor --export "${{ steps.import-gpg.outputs.fingerprint }}" > ../apt-public.key

      - name: Commit and Push to gh-pages
        run: |
          cd current_pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/
          git commit -m "Update APT repository for ${{ steps.get_tag.outputs.tag_name }}"
          git push origin gh-pages
